<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTATO</title>

    <style>
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1px;
            text-align: center;
        }

        .header-song {
            background-color: #151f2a;
            color: rgb(72, 72, 112);
            text-align: center;
            padding: 30px;
        }

        footer {
            text-align: center;
            padding: 1px;
            background-color: #accef1;
            color: rgb(32, 32, 106);
        }

        hr.custom-line {
            border: none;
            border-top: 3px rounded #5b6372;
            color: #5b6372;
            background-color: #5b6372;
            height: 5px;
        }

        .center-img {
            display: block;
            margin-left: auto;
            margin-right: auto;
            width: 25%;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>


</head>

<body>


    <header class="header-song">
        <table style="margin-left: auto; margin-right: auto;">
            <th style="font-size: xx-small;"><audio preload="metadata" controls autoplay loop src="bgm.mp3"
                    type="audio/mp3" id="myaudio"></audio>
                <script>
                    var audio = document.getElementById("myaudio");
                    audio.volume = 0.07;
                </script>
            </th>
            <tr>
                <td align="center"
                    style="font-size: xx-small; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">
                    Só uma musiquinha de fundo :)</td>
            </tr>
        </table>
    </header>

    <header id="top">
        <table cellspacing="40" style="margin-left: auto; margin-right: auto;" id="top">

            <head cellpadding="100">
                <tr>
                    <th colspan="3" align="center">
                        <p style="font-size: 80px;">CONTATO</p>
                    </th>
                </tr>
            </head>

        </table>
    </header>

    <footer>
        <p><a href="../CURRICULO/curriculo.html" style="color: rgb(32, 32, 106);">CURRÍCULO</a> |
            <a href="../GITHUB/github.html" style="color: rgb(32, 32, 106);">GITHUB</a> |
            <a href="../SERVICO/servicos.html" style="color: rgb(32, 32, 106);">SERVIÇOS</a> |
            <a href="../home.html" style="color: rgb(32, 32, 106);">HOME</a>
        </p>
    </footer>


    <br> <br> <br> <br>

    <hr class="custom-line" style="width: 75%; margin: auto;">

    <br>


    <br><br>

    <form>

        <table cellspacing="15" style="margin-left: auto; margin-right: auto;">

            <tr>
                <td><b>Nome Completo:</b></td>
                <td><input type="text" name="nome" placeholder="Digite seu nome completo" size="40"></td>
            </tr>

            <tr>
                <td><b>Telefone:</b></td>
                <td><input type="tel" name="telefone" placeholder="(00) 00000-0000"></td>
            </tr>

            <tr>
                <td><b>E-mail:</b></td>
                <td><input type="email" name="email" placeholder="seuemail@email.com" size="30"></td>
            </tr>

            <tr>
                <td><b>Tipo de Pessoa:</b></td>
                <td>
                    <input type="radio" name="tipo" value="fisica"> Pessoa Física
                    <input type="radio" name="tipo" value="juridica"> Pessoa Jurídica
                </td>
            </tr>

            <tr>
                <td><b>Melhor horário para contato:</b></td>
                <td>
                    <select name="horario">
                        <option>Manhã</option>
                        <option>Tarde</option>
                        <option>Noite</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><b>Tipo de Serviço:</b></td>
                <td>
                    <input type="checkbox" name="servico" value="estatico"> Página Estática
                    <br>
                    <input type="checkbox" name="servico" value="dinamico"> Página Dinâmica
                    <br>
                    <input type="checkbox" name="servico" value="avancado"> Projeto Avançado
                </td>
            </tr>

            <tr>
                <td><b>Descrição do Projeto:</b></td>
                <td>
                    <textarea name="descricao" rows="5" cols="40"
                        placeholder="Descreva o que você deseja..."></textarea>
                </td>
            </tr>

            <tr>
                <td></td>
                <td align="center">
                    <br>
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                </td>
            </tr>

        </table>

    </form>


    <br> <br> <br> <br>

    <hr class="custom-line" style="width: 75%; margin: auto;">

    <br>


    <img src="../kitty.gif" loop autoplay class="center-img"></img>

    </a>

</body>

</html>
